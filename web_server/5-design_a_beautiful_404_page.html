<!DOCTYPE html>
<html>
  <head>
    <title>Lost in the Web</title>
    <style>
      body {
        background: #0f172a;
        color: #e5e7eb;
        font-family: Arial, sans-serif;
        text-align: center;
        padding-top: 10%;
      }
      h1 {
        font-size: 4rem;
        margin-bottom: 0.5rem;
      }
      p {
        font-size: 1.2rem;
      }
      .card {
        background: #111827;
        display: inline-block;
        padding: 2rem 3rem;
        border-radius: 1rem;
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      }
      a {
        color: #22d3ee;
        text-decoration: none;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>404</h1>
      <p>Ceci n'est pas une page</p>
      <p>You seem a bit lost. Let’s go <a href="/">home</a>.</p>
    </div>
  </body>
</html>
